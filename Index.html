<div class="calculator">
  <div class="top-bar">
    <button id="themeToggle">🌙</button>
  </div>

  <input type="text" id="display" disabled>

  <div class="buttons">
    <button>(</button>
    <button>)</button>
    <button>^</button>
    <button class="clear">C</button>

    <button>sin(</button>
    <button>cos(</button>
    <button>tan(</button>
    <button>/</button>

    <button>log(</button>
    <button>ln(</button>
    <button>sqrt(</button>
    <button>*</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>-</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>+</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="equals">=</button>

    <button>0</button>
    <button>.</button>
    <button>pi</button>
    <button>e</button>
  </div>

  <h3>History</h3>
  <div id="history"></div>
</div>
